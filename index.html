<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar System</title>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #aaa;
      font: 14px sans-serif;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="info">Scroll to zoom. Click + drag to rotate.</div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- Setup ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 2000);
    camera.position.set(0, 80, 160);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minDistance = 20;
    controls.maxDistance = 500;

    // --- Starfield ---
    const starGeo = new THREE.BufferGeometry();
    const starPositions = new Float32Array(3000 * 3);
    for (let i = 0; i < starPositions.length; i++) {
      starPositions[i] = (Math.random() - 0.5) * 1200;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.4 })));

    // --- Lighting ---
    scene.add(new THREE.AmbientLight(0x222222));
    const sunLight = new THREE.PointLight(0xffffff, 2, 600);
    scene.add(sunLight);

    // --- Sun ---
    const sunGeo = new THREE.SphereGeometry(8, 48, 48);
    const sunMat = new THREE.MeshBasicMaterial({ color: 0xffcc33 });
    const sun = new THREE.Mesh(sunGeo, sunMat);
    scene.add(sun);

    // Sun glow
    const glowMat = new THREE.SpriteMaterial({
      map: createGlowTexture(),
      color: 0xffaa00,
      transparent: true,
      blending: THREE.AdditiveBlending,
    });
    const glow = new THREE.Sprite(glowMat);
    glow.scale.set(30, 30, 1);
    sun.add(glow);

    function createGlowTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = 128;
      const ctx = canvas.getContext('2d');
      const g = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
      g.addColorStop(0, 'rgba(255,200,50,1)');
      g.addColorStop(0.4, 'rgba(255,150,0,0.4)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, 128, 128);
      const tex = new THREE.CanvasTexture(canvas);
      return tex;
    }

    // --- Planet data ---
    // { name, radius, distance, color, speed, tilt (axial, radians), ring? }
    const planetData = [
      { name: 'Mercury', radius: 0.8,  distance: 16,  color: 0xaaaaaa, speed: 4.15 },
      { name: 'Venus',   radius: 1.5,  distance: 22,  color: 0xe8cda0, speed: 1.62 },
      { name: 'Earth',   radius: 1.6,  distance: 30,  color: 0x4488ff, speed: 1.0 },
      { name: 'Mars',    radius: 1.1,  distance: 38,  color: 0xcc5533, speed: 0.53 },
      { name: 'Jupiter', radius: 4.5,  distance: 56,  color: 0xd4a56a, speed: 0.084 },
      { name: 'Saturn',  radius: 3.8,  distance: 74,  color: 0xe8d5a3, speed: 0.034, ring: true },
      { name: 'Uranus',  radius: 2.5,  distance: 92,  color: 0x88ccdd, speed: 0.012 },
      { name: 'Neptune', radius: 2.4,  distance: 108, color: 0x3355ff, speed: 0.006 },
    ];

    const planets = [];

    for (const p of planetData) {
      // Orbit path
      const orbitGeo = new THREE.BufferGeometry();
      const orbitPts = [];
      for (let i = 0; i <= 128; i++) {
        const a = (i / 128) * Math.PI * 2;
        orbitPts.push(Math.cos(a) * p.distance, 0, Math.sin(a) * p.distance);
      }
      orbitGeo.setAttribute('position', new THREE.Float32BufferAttribute(orbitPts, 3));
      scene.add(new THREE.Line(orbitGeo, new THREE.LineBasicMaterial({ color: 0x333344 })));

      // Planet pivot (for orbiting)
      const pivot = new THREE.Object3D();
      scene.add(pivot);

      // Planet mesh
      const geo = new THREE.SphereGeometry(p.radius, 32, 32);
      const mat = new THREE.MeshStandardMaterial({ color: p.color, roughness: 0.7 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.x = p.distance;
      pivot.add(mesh);

      // Saturn ring
      if (p.ring) {
        const ringGeo = new THREE.RingGeometry(p.radius * 1.3, p.radius * 2.2, 64);
        const ringMat = new THREE.MeshStandardMaterial({
          color: 0xccbb88,
          side: THREE.DoubleSide,
          transparent: true,
          opacity: 0.6,
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = -Math.PI / 2.5;
        mesh.add(ring);
      }

      // Label
      const label = createLabel(p.name);
      label.position.y = p.radius + 1.5;
      mesh.add(label);

      // Random starting angle
      pivot.rotation.y = Math.random() * Math.PI * 2;

      planets.push({ pivot, mesh, speed: p.speed });
    }

    function createLabel(text) {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.font = 'bold 36px sans-serif';
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.fillText(text, 128, 44);
      const tex = new THREE.CanvasTexture(canvas);
      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
      const sprite = new THREE.Sprite(mat);
      sprite.scale.set(6, 1.5, 1);
      return sprite;
    }

    // --- Animate ---
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      for (const p of planets) {
        p.pivot.rotation.y += p.speed * dt * 0.3;
        p.mesh.rotation.y += dt * 0.5; // self-rotation
      }
      sun.rotation.y += dt * 0.1;
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // --- Resize ---
    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
